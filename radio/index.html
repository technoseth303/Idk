<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HF Web Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="radio.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>HF Web Radio</h1>
      <div id="status">Connecting…</div>
    </header>

    <main>
      <section id="display">
        <div id="freq-display">7.100.00 MHz</div>
        <div id="mode-display">LSB</div>
      </section>

      <section id="waterfall-wrapper">
        <canvas id="waterfall"></canvas>
      </section>

      <section id="controls">
        <div class="control-group">
          <label>Frequency (kHz)</label>
          <input id="freq-input" type="number" value="7100" />
          <button id="freq-set">Set</button>
        </div>

        <div class="control-group">
          <label>Mode</label>
          <div class="mode-buttons">
            <button data-mode="am">AM</button>
            <button data-mode="lsb" class="active">LSB</button>
            <button data-mode="usb">USB</button>
            <button data-mode="cw">CW</button>
          </div>
        </div>

        <div class="control-group">
          <label>Zoom</label>
          <button id="zoom-out">-</button>
          <button id="zoom-in">+</button>
        </div>
      </section>

      <section id="audio-section">
        <button id="audio-start">Start audio</button>
        <span id="audio-status">Idle</span>
      </section>
    </main>
  </div>

  <script src="radio.js"></script>
</body>
</html>
