<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HF Web Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="radio.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>HF Web Radio</h1>
      <div id="status">Loading config…</div>
    </header>

    <section id="display">
      <div id="freq-display">0.00000 MHz</div>
      <div id="mode-display">---</div>
    </section>

    <section id="waterfall-wrapper">
      <canvas id="waterfall"></canvas>
    </section>

    <section id="controls">
      <div class="control-group">
        <label>Frequency (kHz)</label>
        <input id="freq-input" type="number" step="0.1" />
        <button id="freq-set">Set</button>
      </div>

      <div class="control-group">
        <label>Mode</label>
        <div class="mode-buttons">
          <button data-mode="am">AM</button>
          <button data-mode="lsb">LSB</button>
          <button data-mode="usb">USB</button>
          <button data-mode="cw">CW</button>
        </div>
      </div>

      <div class="control-group">
        <label>Zoom</label>
        <button id="zoom-out">-</button>
        <button id="zoom-in">+</button>
      </div>

      <div class="control-group">
        <label>Audio</label>
        <button id="audio-start">Start audio</button>
        <span id="audio-status">Idle</span>
      </div>
    </section>
  </div>

  <script src="radio.js"></script>
</body>
</html>
