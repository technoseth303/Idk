<!DOCTYPE html>
<html>
<head>
    <title>FNaF Camera Grid</title>
    <link rel="stylesheet" href="games.css">
</head>
<body class="crt">

<div id="static-overlay"></div>

<h1 class="cam-title">CAM SELECT</h1>

<div class="cam-grid">

    <div class="cam-box" onclick="openGame('fnaf1.html')">
        <img src="covers/fnaf1.jpg" class="cam-img">
        <div class="cam-label">CAM 1A — FNaF 1</div>
    </div>

    <div class="cam-box" onclick="openGame('fnaf2.html')">
        <img src="covers/fnaf2.jpg" class="cam-img">
        <div class="cam-label">CAM 1B — FNaF 2</div>
    </div>

    <div class="cam-box" onclick="openGame('fnaf3.html')">
        <img src="covers/fnaf3.jpg" class="cam-img">
        <div class="cam-label">CAM 2A — FNaF 3</div>
    </div>

    <div class="cam-box" onclick="openGame('fnaf4.html')">
        <img src="covers/fnaf4.jpg" class="cam-img">
        <div class="cam-label">CAM 2B — FNaF 4</div>
    </div>

    <div class="cam-box" onclick="openGame('sl.html')">
        <img src="covers/sl.jpg" class="cam-img">
        <div class="cam-label">CAM 3 — Sister Location</div>
    </div>

</div>

<script src="games.js"></script>
</body>
</html>
